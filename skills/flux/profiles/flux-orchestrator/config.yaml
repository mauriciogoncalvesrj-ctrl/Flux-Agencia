# Flux Orquestrador — Planejamento, decomposição, coordenação
model:
  default: deepseek-v4-pro
  provider: opencode-go

providers:
  opencode-go:
    api_key: ${OPENCODE_GO_API_KEY}
    base_url: https://opencode.ai/zen/go/v1

fallback_providers:
- provider: opencode-go
  model: deepseek-v4-flash
- provider: opencode-go
  model: qwen3.5-plus
- provider: opencode-go
  model: kimi-k2.6

agent:
  max_turns: 30
  reasoning_effort: high
  gateway_timeout: 1800
  tool_use_enforcement: auto

toolsets:
- web
- search
- browser
- file
- delegation
- todo
- memory
- skills
- terminal

skills:
  auto_load:
  - flux-orchestrator
